<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="../assets/bootstrap.min.css" />
		<link rel="stylesheet" href="style.css" />
		<script defer src="index.js"></script>
		<title>File upload</title>
	</head>
	<body>
		<main>
			<div class="form-group">
				<label for="password">Password</label>
				<input
					id="password"
					class="form-control"
					type="password"
					autofocus
					autocomplete="current-password"
				/>
			</div>
			<div class="custom-file w-50">
				<input id="fileInput" class="custom-file-input" type="file" multiple />
				<label for="fileInput" class="custom-file-label">Select files</label>
			</div>
			<ul id="fileList" class="list-group rounded">
				<div id="fileHover">Drag and drop files here</div>
			</ul>
			<button id="uploadBtn" class="btn btn-primary mr-2">Upload</button>
			<button id="clearListBtn" class="btn btn-danger">Clear list</button>
			<button id="abortBtn" class="btn btn-danger" style="display: none;">Cancel upload</button>

			<div class="progress mt-5">
				<div
					id="progress"
					class="progress-bar"
					role="progressbar"
					style="width: 0%"
					aria-valuenow="0"
					aria-valuemin="0"
					aria-valuemax="100"
				></div>
			</div>
			<div class="w-100 my-3 text-center">
				<span id="progressPercentage">0</span><span> %</span>
			</div>
			<div id="status" class="alert alert-danger" style="display: none;"></div>
			<ul id="url" class="list-group "></ul>
		</main>
	</body>
</html>
